<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Globe - Photography Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000000 100%);
            font-family: 'Inter', sans-serif;
        }

        #globe-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(ellipse at center, #0d0d20 0%, #000000 100%);
        }

        canvas {
            display: block;
        }

        /* Navigation */
        .globe-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .globe-nav .logo a {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
        }

        .globe-nav .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
        }

        .globe-nav .nav-links a {
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .globe-nav .nav-links a:hover {
            color: #c9a962;
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 50px;
            color: #fff;
            font-size: 0.9rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .info-panel svg {
            width: 20px;
            height: 20px;
            opacity: 0.7;
        }

        /* Album Modal - Minimalist Luxury */
        .photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.97);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
            backdrop-filter: blur(20px);
        }

        .photo-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .photo-modal.closing {
            opacity: 0;
            visibility: hidden;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            background: transparent;
        }

        .modal-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 3rem;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: flex-start;
            z-index: 10;
        }

        .modal-header-left {
            display: flex;
            flex-direction: column;
        }

        .modal-header h3 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            margin: 0;
        }

        .modal-header .location-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-top: 0.4rem;
        }

        .modal-header .photo-count {
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 0.5rem 0;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-align: center;
        }

        .modal-header-right {
            display: flex;
            justify-content: flex-end;
        }

        .modal-close {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 200;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 44px;
            height: 44px;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            opacity: 1;
            border-color: #fff;
            transform: rotate(90deg);
        }

        /* Main photo display */
        .main-photo-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .main-photo-container img {
            display: block;
            max-width: 85vw;
            max-height: 75vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 0;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
        }

        .photo-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            width: 56px;
            height: 56px;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0.4;
        }

        .photo-nav:hover {
            opacity: 1;
            border-color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .photo-nav.prev {
            left: 2.5rem;
        }

        .photo-nav.next {
            right: 2.5rem;
        }

        /* Thumbnail strip */
        .thumbnail-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 3rem 2.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            justify-content: center;
        }

        .thumbnail-strip::-webkit-scrollbar {
            height: 0;
            display: none;
        }

        .thumbnail {
            width: 64px;
            height: 64px;
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            opacity: 0.5;
        }

        .thumbnail:hover {
            opacity: 0.8;
            transform: translateY(-4px);
        }

        .thumbnail.active {
            opacity: 1;
            border-color: #fff;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: filter 0.3s ease;
        }

        .thumbnail.active img,
        .thumbnail:hover img {
            filter: grayscale(0%);
        }

        .modal-info {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 1.5rem;
            border-radius: 0 0 8px 8px;
            margin-top: -5px;
        }

        .modal-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .modal-info p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Location List Sidebar */
        .location-sidebar {
            position: fixed;
            right: 0;
            top: 80px;
            bottom: 0;
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            z-index: 500;
            padding: 1.5rem;
            overflow-y: auto;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .location-sidebar.active {
            transform: translateX(0);
        }

        .location-sidebar h3 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .location-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .location-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateX(-5px);
        }

        .location-item img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
        }

        .location-item-info h4 {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }

        .location-item-info p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .location-item-info p::before {
            content: '📸';
            font-size: 0.7rem;
        }

        .toggle-sidebar {
            position: fixed;
            right: 20px;
            top: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            z-index: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .toggle-sidebar:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .toggle-sidebar.shifted {
            right: 320px;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, #0d0d20 0%, #000000 100%);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #c9a962;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(201, 169, 98, 0.3);
        }

        .loading-text {
            color: #fff;
            margin-top: 1.5rem;
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .loading-subtext {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 0.5rem;
            font-size: 0.8rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Marker Tooltip */
        .marker-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.2s ease;
            border: 1px solid rgba(201, 169, 98, 0.3);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .marker-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* No Photos Message */
        .no-photos-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 100;
        }

        .no-photos-message h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .no-photos-message p {
            opacity: 0.7;
            margin-bottom: 1.5rem;
        }

        .no-photos-message a {
            color: #c9a962;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <p class="loading-text">LOADING EARTH</p>
        <p class="loading-subtext">Preparing your photo globe...</p>
    </div>

    <!-- Navigation -->
    <nav class="globe-nav">
        <div class="logo">
            <a href="index.html">Nora Liu</a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Portfolio</a></li>
            <li><a href="earth.html" style="color: #c9a962;">Globe View</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
            <li><a href="owner.html">👤 Owner</a></li>
        </ul>
    </nav>
    <script>
        if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
            document.querySelectorAll('a[href="owner.html"]').forEach(a => a.parentElement.style.display = 'none');
        }
    </script>

    <!-- Globe Container -->
    <div id="globe-container"></div>

    <!-- Info Panel -->
    <div class="info-panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span>Drag to rotate • Scroll to zoom • Click markers to view photos</span>
    </div>

    <!-- Toggle Sidebar Button -->
    <button class="toggle-sidebar" id="toggleSidebar">📍 Locations</button>

    <!-- Location Sidebar -->
    <div class="location-sidebar" id="locationSidebar">
        <h3>Photo Locations</h3>
        <div id="locationList"></div>
    </div>

    <!-- Album Modal -->
    <div class="photo-modal" id="photoModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-left">
                    <h3 id="modalTitle"></h3>
                    <div class="location-badge">
                        <span>📍</span>
                        <span id="modalLocation"></span>
                    </div>
                </div>
                <span class="photo-count" id="photoCount"></span>
                <div class="modal-header-right">
                    <button class="modal-close" id="modalClose">✕</button>
                </div>
            </div>
            <div class="main-photo-container">
                <button class="photo-nav prev" id="prevPhoto">‹</button>
                <img id="modalImage" src="" alt="Photo">
                <button class="photo-nav next" id="nextPhoto">›</button>
            </div>
            <div class="thumbnail-strip" id="thumbnailStrip"></div>
        </div>
    </div>

    <!-- Marker Tooltip -->
    <div class="marker-tooltip" id="markerTooltip"></div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Photo locations data (will be loaded from server)
        let photoLocations = [];
        let galleryImages = [];

        // Three.js variables
        let scene, camera, renderer, controls, earth, markers = [];
        let raycaster, mouse;
        let markerGroup; // Group to hold markers, will be child of earth

        // Initialize
        async function init() {
            await loadData();
            setupThreeJS();
            createEarth();
            createMarkers();
            setupEventListeners();
            animate();
            
            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1000);
        }

        // Fix absolute paths to relative for GitHub Pages
        function fixPath(p) {
            return p && p.startsWith('/') ? p.substring(1) : p;
        }

        // Load gallery data
        async function loadData() {
            try {
                let response;
                try {
                    response = await fetch('/api/images');
                } catch (e) {
                    response = await fetch('gallery-data.json');
                }
                if (!response.ok) response = await fetch('gallery-data.json');
                const data = await response.json();
                
                // API returns array directly or {images: [...]}
                galleryImages = Array.isArray(data) ? data : (data.images || []);
                
                console.log('Loaded images:', galleryImages);
                
                // Filter images that have location data and group by location
                const imagesWithLocation = galleryImages.filter(img => img.latitude && img.longitude);
                
                // Group photos by location name (creating albums)
                const locationGroups = {};
                imagesWithLocation.forEach(img => {
                    const locationKey = img.locationName || `${img.latitude.toFixed(2)},${img.longitude.toFixed(2)}`;
                    if (!locationGroups[locationKey]) {
                        locationGroups[locationKey] = {
                            locationName: img.locationName || 'Unknown Location',
                            latitude: img.latitude,
                            longitude: img.longitude,
                            photos: []
                        };
                    }
                    locationGroups[locationKey].photos.push(img);
                });
                
                // Convert to array of location albums
                photoLocations = Object.values(locationGroups);
                
                console.log('Location albums:', photoLocations);
                
                // Update location list
                updateLocationList();
            } catch (error) {
                console.error('Error loading gallery data:', error);
            }
        }

        // Setup Three.js scene
        function setupThreeJS() {
            const container = document.getElementById('globe-container');
            
            // Scene
            scene = new THREE.Scene();
            
            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 3;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // Controls with tighter zoom limits
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 1.8;  // Can get closer to see detail
            controls.maxDistance = 3.5;  // Prevent zooming out too far
            controls.enablePan = false;
            controls.rotateSpeed = 0.5;  // Smoother rotation
            controls.zoomSpeed = 0.8;    // Slightly slower zoom for more control
            
            // Lighting - soft and balanced for a natural look
            // Higher ambient for overall soft illumination
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            // Main light from front-right, softer intensity
            const directionalLight = new THREE.DirectionalLight(0xfff8f0, 0.5);
            directionalLight.position.set(3, 2, 4);
            scene.add(directionalLight);
            
            // Soft fill light from the left
            const fillLight = new THREE.DirectionalLight(0xaaccff, 0.3);
            fillLight.position.set(-4, 1, 2);
            scene.add(fillLight);
            
            // Subtle back rim light for depth
            const rimLight = new THREE.DirectionalLight(0x4488cc, 0.2);
            rimLight.position.set(0, -2, -4);
            scene.add(rimLight);
            
            // Stars background
            createStars();
            
            // Raycaster for click detection
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
        }

        // Create starfield background with varying star sizes and colors
        function createStars() {
            // Create multiple star layers for depth - brighter and more visible
            const starLayers = [
                { count: 2000, size: 0.012, opacity: 1.0, distance: 50 },
                { count: 4000, size: 0.008, opacity: 0.9, distance: 70 },
                { count: 6000, size: 0.005, opacity: 0.7, distance: 90 }
            ];
            
            starLayers.forEach(layer => {
                const starsGeometry = new THREE.BufferGeometry();
                const starsVertices = [];
                const starColors = [];
                
                for (let i = 0; i < layer.count; i++) {
                    // Distribute stars on a sphere
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r = layer.distance + (Math.random() - 0.5) * 15;
                    
                    const x = r * Math.sin(phi) * Math.cos(theta);
                    const y = r * Math.sin(phi) * Math.sin(theta);
                    const z = r * Math.cos(phi);
                    starsVertices.push(x, y, z);
                    
                    // Add subtle color variation (white, slight blue, slight yellow)
                    const colorChoice = Math.random();
                    if (colorChoice < 0.6) {
                        starColors.push(1, 1, 1); // White
                    } else if (colorChoice < 0.8) {
                        starColors.push(0.85, 0.92, 1); // Slight blue
                    } else {
                        starColors.push(1, 0.95, 0.85); // Slight warm
                    }
                }
                
                starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
                starsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(starColors, 3));
                
                const starsMaterial = new THREE.PointsMaterial({
                    size: layer.size,
                    transparent: true,
                    opacity: layer.opacity,
                    vertexColors: true,
                    sizeAttenuation: true
                });
                
                const stars = new THREE.Points(starsGeometry, starsMaterial);
                scene.add(stars);
            });
            
            // Add brighter accent stars scattered around
            const brightStarsGeometry = new THREE.BufferGeometry();
            const brightVertices = [];
            const brightColors = [];
            for (let i = 0; i < 150; i++) {
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 55 + Math.random() * 25;
                brightVertices.push(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
                // Vary bright star colors slightly
                const tint = Math.random();
                if (tint < 0.5) {
                    brightColors.push(1, 1, 1);
                } else if (tint < 0.75) {
                    brightColors.push(0.9, 0.95, 1);
                } else {
                    brightColors.push(1, 0.98, 0.9);
                }
            }
            brightStarsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(brightVertices, 3));
            brightStarsGeometry.setAttribute('color', new THREE.Float32BufferAttribute(brightColors, 3));
            const brightStarsMaterial = new THREE.PointsMaterial({
                size: 0.02,
                transparent: true,
                opacity: 1.0,
                vertexColors: true
            });
            scene.add(new THREE.Points(brightStarsGeometry, brightStarsMaterial));
        }

        // Create Earth sphere with high-quality textures
        function createEarth() {
            // High polygon count for smooth appearance even when zoomed in
            const geometry = new THREE.SphereGeometry(1, 256, 256);
            
            const textureLoader = new THREE.TextureLoader();
            
            // Use a nice blue earth material as fallback while textures load
            const earthMaterial = new THREE.MeshStandardMaterial({
                color: 0x4477cc,
                emissive: 0x112244,
                emissiveIntensity: 0.15,
                roughness: 0.8,
                metalness: 0.1
            });
            
            earth = new THREE.Mesh(geometry, earthMaterial);
            scene.add(earth);
            
            // Create marker group as child of earth so markers rotate with it
            markerGroup = new THREE.Group();
            earth.add(markerGroup);
            
            // Load high-quality Earth textures
            // Using multiple resolution options for best quality
            const textureURLs = [
                // High-res NASA Blue Marble (8K)
                'https://unpkg.com/three-globe@2.31.0/example/img/earth-blue-marble.jpg',
                // Alternative high quality source
                'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_8k.jpg',
                // Fallback
                'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'
            ];
            
            // Function to apply texture with optimal settings
            function applyEarthTexture(texture) {
                // Maximum anisotropic filtering for sharp details when viewed at angles
                texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
                // Use linear filtering for smooth appearance
                texture.minFilter = THREE.LinearMipmapLinearFilter;
                texture.magFilter = THREE.LinearFilter;
                // Generate mipmaps for better quality at different zoom levels
                texture.generateMipmaps = true;
                
                earth.material = new THREE.MeshStandardMaterial({
                    map: texture,
                    emissive: 0x113355,
                    emissiveIntensity: 0.08,
                    roughness: 0.85,
                    metalness: 0.05
                });
            }
            
            // Try loading textures in order of preference
            function loadTextureWithFallback(index) {
                if (index >= textureURLs.length) {
                    console.log('Using fallback procedural material');
                    return;
                }
                
                textureLoader.load(
                    textureURLs[index],
                    (texture) => {
                        console.log('Loaded texture:', textureURLs[index]);
                        applyEarthTexture(texture);
                    },
                    undefined,
                    (error) => {
                        console.log('Failed to load:', textureURLs[index], '- trying next...');
                        loadTextureWithFallback(index + 1);
                    }
                );
            }
            
            loadTextureWithFallback(0);
            
            // Add atmosphere glow effect (outer glow)
            const atmosphereGeometry = new THREE.SphereGeometry(1.015, 128, 128);
            const atmosphereMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                        gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true
            });
            const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            atmosphere.scale.set(1.1, 1.1, 1.1);
            scene.add(atmosphere);
            
            // Add a subtle inner atmosphere/haze
            const innerAtmosphereGeometry = new THREE.SphereGeometry(1.005, 128, 128);
            const innerAtmosphereMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    varying vec3 vNormal;
                    void main() {
                        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                        gl_FragColor = vec4(0.4, 0.7, 1.0, 0.4) * intensity;
                    }
                `,
                blending: THREE.AdditiveBlending,
                side: THREE.FrontSide,
                transparent: true
            });
            const innerAtmosphere = new THREE.Mesh(innerAtmosphereGeometry, innerAtmosphereMaterial);
            scene.add(innerAtmosphere);
        }

        // Convert lat/long to 3D position
        function latLongToVector3(lat, long, radius = 1.02) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (long + 180) * (Math.PI / 180);
            
            const x = -radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.sin(theta);
            
            return new THREE.Vector3(x, y, z);
        }

        // Create markers for photo locations
        function createMarkers() {
            // Clear existing markers from the marker group
            if (markerGroup) {
                while (markerGroup.children.length > 0) {
                    markerGroup.remove(markerGroup.children[0]);
                }
            }
            markers = [];
            
            photoLocations.forEach((album, index) => {
                const position = latLongToVector3(album.latitude, album.longitude);
                
                // Create a group for the marker
                const markerContainer = new THREE.Group();
                markerContainer.position.copy(position);
                
                // Uniform pin size for all markers
                const pinScale = 0.8;
                
                // Pin head - glossy red ball with subtle shine
                const headGeometry = new THREE.SphereGeometry(0.012 * pinScale, 32, 32);
                const headMaterial = new THREE.MeshPhongMaterial({ 
                    color: 0xdc2626,
                    emissive: 0x3a0808,
                    shininess: 40,
                    specular: 0xffffff
                });
                const head = new THREE.Mesh(headGeometry, headMaterial);
                head.position.set(0, 0.065 * pinScale, 0);
                
                // Store album data in head for raycasting
                head.userData = {
                    album: album,
                    index: index
                };
                
                markerContainer.add(head);
                markers.push(head);
                
                // Pin needle - metallic silver with subtle shine
                const needleGeometry = new THREE.CylinderGeometry(0.0005 * pinScale, 0.003 * pinScale, 0.07 * pinScale, 16);
                const needleMaterial = new THREE.MeshPhongMaterial({
                    color: 0xe8e8e8,
                    emissive: 0x1a1a1a,
                    shininess: 60,
                    specular: 0xffffff
                });
                const needle = new THREE.Mesh(needleGeometry, needleMaterial);
                needle.position.set(0, 0.035 * pinScale, 0);
                needle.rotation.x = Math.PI; // Point downward
                markerContainer.add(needle);
                
                // Orient the pin to point outward from globe center
                markerContainer.lookAt(new THREE.Vector3(0, 0, 0));
                markerContainer.rotateX(-Math.PI / 2);
                
                markerGroup.add(markerContainer);
            });
        }

        // Setup event listeners
        function setupEventListeners() {
            // Window resize
            window.addEventListener('resize', onWindowResize);
            
            // Mouse events for marker interaction
            renderer.domElement.addEventListener('click', onMouseClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            
            // Modal close - X button and Escape key only
            document.getElementById('modalClose').addEventListener('click', closeModal);
            
            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                const modal = document.getElementById('photoModal');
                if (!modal.classList.contains('active')) return;
                
                if (e.key === 'Escape') {
                    closeModal();
                } else if (e.key === 'ArrowLeft') {
                    navigateToPhoto(currentPhotoIndex - 1);
                } else if (e.key === 'ArrowRight') {
                    navigateToPhoto(currentPhotoIndex + 1);
                }
            });
            
            // Sidebar toggle
            document.getElementById('toggleSidebar').addEventListener('click', toggleSidebar);
        }

        // Window resize handler
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Mouse click handler
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers);
            
            if (intersects.length > 0) {
                const marker = intersects[0].object;
                if (marker.userData.album) {
                    showAlbumModal(marker.userData.album);
                }
            }
        }

        // Mouse move handler for tooltip
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers);
            
            const tooltip = document.getElementById('markerTooltip');
            
            if (intersects.length > 0) {
                const marker = intersects[0].object;
                if (marker.userData.album) {
                    const album = marker.userData.album;
                    const photoCount = album.photos.length;
                    tooltip.textContent = `${album.locationName} (${photoCount} photo${photoCount > 1 ? 's' : ''})`;
                    tooltip.style.left = event.clientX + 15 + 'px';
                    tooltip.style.top = event.clientY - 10 + 'px';
                    tooltip.classList.add('visible');
                    renderer.domElement.style.cursor = 'pointer';
                    return;
                }
            }
            
            tooltip.classList.remove('visible');
            renderer.domElement.style.cursor = 'grab';
        }

        // Show photo modal
        function showPhotoModal(photo) {
            const modal = document.getElementById('photoModal');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalLocation = document.getElementById('modalLocation');
            
            modalImage.src = fixPath(photo.path);
            modalTitle.textContent = photo.locationName || 'Photo';
            modalLocation.textContent = `📍 ${photo.latitude.toFixed(4)}, ${photo.longitude.toFixed(4)}`;
            
            modal.classList.add('active');
        }

        // Current album state for navigation
        let currentAlbum = null;
        let currentPhotoIndex = 0;

        // Show album modal
        function showAlbumModal(album) {
            currentAlbum = album;
            currentPhotoIndex = 0;
            
            const modal = document.getElementById('photoModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalLocation = document.getElementById('modalLocation');
            const photoCount = document.getElementById('photoCount');
            const thumbnailStrip = document.getElementById('thumbnailStrip');
            
            modalTitle.textContent = album.locationName;
            modalLocation.textContent = `${album.latitude.toFixed(4)}, ${album.longitude.toFixed(4)}`;
            photoCount.textContent = `${album.photos.length} photo${album.photos.length > 1 ? 's' : ''}`;
            
            // Generate thumbnails
            thumbnailStrip.innerHTML = album.photos.map((photo, index) => `
                <div class="thumbnail ${index === 0 ? 'active' : ''}" data-index="${index}">
                    <img src="${fixPath(photo.smallThumbnailPath || photo.thumbnailPath || photo.path)}" alt="Photo ${index + 1}">
                </div>
            `).join('');
            
            // Add click handlers to thumbnails
            thumbnailStrip.querySelectorAll('.thumbnail').forEach(thumb => {
                thumb.addEventListener('click', () => {
                    const index = parseInt(thumb.dataset.index);
                    navigateToPhoto(index);
                });
            });
            
            // Show first photo
            updateMainPhoto();
            updateNavButtons();
            
            modal.classList.add('active');
            
            // Setup navigation button handlers
            document.getElementById('prevPhoto').onclick = () => navigateToPhoto(currentPhotoIndex - 1);
            document.getElementById('nextPhoto').onclick = () => navigateToPhoto(currentPhotoIndex + 1);
        }

        // Navigate to specific photo in album (cycles)
        function navigateToPhoto(index) {
            if (!currentAlbum) return;
            
            // Cycle through photos
            if (index < 0) {
                index = currentAlbum.photos.length - 1;
            } else if (index >= currentAlbum.photos.length) {
                index = 0;
            }
            
            currentPhotoIndex = index;
            updateMainPhoto();
            
            // Update active thumbnail
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
            
            // Scroll active thumbnail into view
            const activeThumbnail = document.querySelector('.thumbnail.active');
            if (activeThumbnail) {
                activeThumbnail.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }
        }

        // Update main photo display
        function updateMainPhoto() {
            if (!currentAlbum) return;
            const photo = currentAlbum.photos[currentPhotoIndex];
            document.getElementById('modalImage').src = fixPath(photo.path);
        }

        // Update navigation button visibility (no disabled state since we cycle)
        function updateNavButtons() {
            if (!currentAlbum) return;
            
            // Hide nav buttons if only one photo
            const showNav = currentAlbum.photos.length > 1;
            document.getElementById('prevPhoto').style.display = showNav ? 'flex' : 'none';
            document.getElementById('nextPhoto').style.display = showNav ? 'flex' : 'none';
        }

        // Close modal
        // Close modal with smooth transition
        function closeModal() {
            const modal = document.getElementById('photoModal');
            modal.classList.remove('active');
            modal.classList.add('closing');
            
            // Wait for transition to complete before resetting state
            setTimeout(() => {
                modal.classList.remove('closing');
                currentAlbum = null;
                currentPhotoIndex = 0;
            }, 400);
        }

        // Toggle sidebar
        function toggleSidebar() {
            const sidebar = document.getElementById('locationSidebar');
            const toggleBtn = document.getElementById('toggleSidebar');
            sidebar.classList.toggle('active');
            toggleBtn.classList.toggle('shifted');
        }

        // Update location list in sidebar (now shows albums)
        function updateLocationList() {
            const listContainer = document.getElementById('locationList');
            
            if (photoLocations.length === 0) {
                listContainer.innerHTML = '<p style="color: rgba(255,255,255,0.6); font-size: 0.85rem;">No photos with locations yet. Add locations to your photos to see them on the globe!</p>';
                return;
            }
            
            listContainer.innerHTML = photoLocations.map((album, index) => `
                <div class="location-item" onclick="openAlbumModal(${index})" onmouseenter="rotateToLocation(${index})">
                    <img src="${fixPath(album.photos[0].smallThumbnailPath || album.photos[0].thumbnailPath || album.photos[0].path)}" alt="${album.locationName || 'Album'}">
                    <div class="location-item-info">
                        <h4>${album.locationName || 'Unknown Location'}</h4>
                        <p>${album.photos.length} photo${album.photos.length > 1 ? 's' : ''}</p>
                    </div>
                </div>
            `).join('');
        }

        // Track when to resume auto-rotation
        let autoRotationPausedUntil = 0;

        // Rotate earth to show location (on hover) - keeps current zoom level
        window.rotateToLocation = function(index) {
            const album = photoLocations[index];
            if (!album) return;
            
            // Keep the current distance from earth center (no zoom change)
            const currentDistance = camera.position.length();
            
            // Account for the earth's accumulated rotation so the camera
            // points at the actual current position of the location on the
            // rotated globe, not where it would be at rotation=0.
            const earthRotY = earth.rotation.y;
            const adjustedLng = album.longitude + THREE.MathUtils.radToDeg(earthRotY);
            const targetPosition = latLongToVector3(album.latitude, adjustedLng, currentDistance);
            
            // Use spherical coordinates for smooth rotation around the globe
            const startSpherical = new THREE.Spherical().setFromVector3(camera.position);
            const endSpherical = new THREE.Spherical().setFromVector3(targetPosition);
            
            // Normalize phi angles to ensure shortest path
            let deltaPhi = endSpherical.phi - startSpherical.phi;
            
            // Normalize theta to take the shortest path around the globe
            let deltaTheta = endSpherical.theta - startSpherical.theta;
            
            // Adjust for shortest rotation path (wrap around)
            while (deltaTheta > Math.PI) deltaTheta -= 2 * Math.PI;
            while (deltaTheta < -Math.PI) deltaTheta += 2 * Math.PI;
            
            const duration = 2500;
            const startTime = Date.now();
            
            function animateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Smooth sine-based easing for very elegant motion
                const eased = 0.5 - 0.5 * Math.cos(progress * Math.PI);
                
                // Interpolate spherical coordinates
                const currentSpherical = new THREE.Spherical(
                    currentDistance,
                    startSpherical.phi + deltaPhi * eased,
                    startSpherical.theta + deltaTheta * eased
                );
                
                camera.position.setFromSpherical(currentSpherical);
                camera.lookAt(0, 0, 0);
                
                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                } else {
                    // Pause auto-rotation for 5 seconds after reaching destination
                    autoRotationPausedUntil = Date.now() + 5000;
                }
            }
            
            // Also pause during the animation
            autoRotationPausedUntil = Date.now() + duration + 5000;
            animateCamera();
        };

        // Open album modal immediately (on click)
        window.openAlbumModal = function(index) {
            const album = photoLocations[index];
            if (!album) return;
            showAlbumModal(album);
        };

        // Legacy function for compatibility
        window.focusOnLocation = function(index, showModal = true) {
            rotateToLocation(index);
            if (showModal) {
                const album = photoLocations[index];
                if (album) showAlbumModal(album);
            }
        };

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const time = Date.now() * 0.001;
            
            // Slowly rotate Earth when not interacting and not paused
            const isPaused = Date.now() < autoRotationPausedUntil;
            if (!controls.enabled || (!isDragging && !isPaused)) {
                earth.rotation.y += 0.0003;
            }
            
            // Animate pins with gentle floating effect
            if (markerGroup) {
                markerGroup.children.forEach((container, i) => {
                    const offset = i * 0.7;
                    const float = Math.sin(time * 1.2 + offset) * 0.015;
                    container.position.normalize().multiplyScalar(1.02 + float);
                });
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        let isDragging = false;
        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
